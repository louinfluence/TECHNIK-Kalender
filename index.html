<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TECHNIK-Kalender</title>

  <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
  <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════ */
    :root {
      --c-buehne: #7c3aed;
      --c-licht:  #ca8a04;
      --c-ton:    #0284c7;
      --c-video:  #0d9488;

      --border:   rgba(0,0,0,.15);
      --border2:  rgba(0,0,0,.25);
      --surface:  rgba(0,0,0,.04);
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --font: system-ui, -apple-system, "Helvetica Neue", sans-serif;
    }

    /* ═══════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; }

    html {
      height: 100%;
      color-scheme: light dark;
    }

    body {
      margin: 0;
      padding: 0;
      height: 100%;
      /* dvh accounts for iOS Safari's collapsible toolbar */
      height: 100dvh;
      overflow: hidden;
      font-family: var(--font);
      display: flex;
      flex-direction: column;
    }

    /* ═══════════════════════════════════════
       HEADER — fixed height, never grows
    ═══════════════════════════════════════ */
    header {
      flex: none;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px 14px;
      background: Canvas;
      border-bottom: 2px solid var(--border2);
    }
    header h1 {
      margin: 0 4px 0 0;
      font-size: 18px;
      font-weight: 800;
    }

    /* ═══════════════════════════════════════
       BUTTONS
    ═══════════════════════════════════════ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font);
      border: 2px solid var(--border2);
      border-radius: var(--r-md);
      background: var(--surface);
      color: inherit;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(.97); }
    .btn.primary { border-color: rgba(0,90,255,.5);   color: rgb(0,80,230); }
    .btn.danger  { border-color: rgba(220,40,40,.5);  color: rgb(200,20,20); }

    .sep {
      flex: none;
      width: 2px;
      height: 32px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 2px;
    }

    #focusDate {
      min-height: 44px;
      padding: 0 12px;
      font-size: 15px;
      font-family: var(--font);
      border: 2px solid var(--border2);
      border-radius: var(--r-md);
      background: var(--surface);
      color: inherit;
    }

    /* ═══════════════════════════════════════
       TIMELINE WRAPPER
       flex:1 + min-height:0 fills remaining screen.
       We measure #wrap.offsetHeight in JS to set
       vis-timeline's pixel height — this is more
       reliable than window.innerHeight math.
    ═══════════════════════════════════════ */
    #wrap {
      flex: 1;
      min-height: 0;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }
    #timeline {
      flex: 1;
      min-height: 0;
      border: 2px solid var(--border2);
      border-radius: var(--r-lg);
      overflow: hidden;
      background: Canvas;
    }

    /* ═══════════════════════════════════════
       VIS-TIMELINE OVERRIDES
       !important is required where vis-timeline
       sets the same properties via inline JS.
    ═══════════════════════════════════════ */
    .vis-timeline {
      border: none !important;
      font-family: var(--font) !important;
    }
    .vis-label {
      display: flex !important;
      align-items: center !important;
      padding-left: 14px !important;
      font-size: 16px !important;
      font-weight: 700 !important;
      border-bottom: 2px solid var(--border) !important;
    }
    .vis-group {
      border-bottom: 2px solid var(--border) !important;
    }
    .vis-time-axis .vis-text {
      font-size: 13px !important;
      font-weight: 600 !important;
    }
    .vis-item {
      border-width: 2px !important;
      border-radius: var(--r-sm) !important;
      overflow: visible !important;
    }
    .vis-item .vis-item-content {
      font-size: 14px !important;
      font-weight: 600 !important;
      padding: 0 10px !important;
      white-space: nowrap !important;
      overflow: visible !important;
    }

    /* ═══════════════════════════════════════
       STATUS COLORS
    ═══════════════════════════════════════ */
    .vis-item.status-todo     { background: rgba(160,160,160,.28); border-color: rgba(110,110,110,.85); }
    .vis-item.status-doing    { background: rgba( 37, 99,235,.22); border-color: rgba( 37, 99,235,.90); }
    .vis-item.status-wait     { background: rgba(217,119,  6,.22); border-color: rgba(217,119,  6,.90); }
    .vis-item.status-critical { background: rgba(220, 38, 38,.22); border-color: rgba(220, 38, 38,.90); }
    .vis-item.status-done     { background: rgba( 22,163, 74,.20); border-color: rgba( 22,163, 74,.85); opacity: .9; }

    /* ═══════════════════════════════════════
       TEXT FORMAT CLASSES
    ═══════════════════════════════════════ */
    .vis-item.fmt-bold .vis-item-content      { font-weight: 800 !important; }
    .vis-item.fmt-italic .vis-item-content    { font-style: italic; }
    .vis-item.fmt-underline .vis-item-content { text-decoration: underline; }

    /* ═══════════════════════════════════════
       GEWERK COLORS — left-edge bar + label
    ═══════════════════════════════════════ */
    .vis-item.wk-buehne { box-shadow: inset 7px 0 0 var(--c-buehne); }
    .vis-item.wk-licht  { box-shadow: inset 7px 0 0 var(--c-licht);  }
    .vis-item.wk-ton    { box-shadow: inset 7px 0 0 var(--c-ton);    }
    .vis-item.wk-video  { box-shadow: inset 7px 0 0 var(--c-video);  }

    .vis-label.wk-buehne { border-left: 8px solid var(--c-buehne) !important; background: rgba(124, 58,237,.07); }
    .vis-label.wk-licht  { border-left: 8px solid var(--c-licht)  !important; background: rgba(202,138,  4,.07); }
    .vis-label.wk-ton    { border-left: 8px solid var(--c-ton)    !important; background: rgba(  2,132,199,.07); }
    .vis-label.wk-video  { border-left: 8px solid var(--c-video)  !important; background: rgba( 13,148,136,.07); }

    /* ═══════════════════════════════════════
       MODAL
    ═══════════════════════════════════════ */
    dialog {
      width: min(680px, 96vw);
      max-height: 92dvh;
      overflow-y: auto;
      border: 2px solid var(--border2);
      border-radius: 18px;
      padding: 0;
      background: Canvas;
      color: CanvasText;
    }
    dialog::backdrop { background: rgba(0,0,0,.45); }

    .modal-head {
      position: sticky;
      top: 0;
      padding: 16px 18px 12px;
      background: Canvas;
      border-bottom: 2px solid var(--border);
      z-index: 1;
    }
    .modal-head b { font-size: 17px; font-weight: 800; }

    .modal-body { padding: 16px 18px; display: grid; gap: 14px; }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    label { display: grid; gap: 6px; font-size: 14px; font-weight: 600; }

    input, select, textarea {
      min-height: 48px;
      padding: 10px 14px;
      border-radius: var(--r-md);
      border: 2px solid var(--border2);
      background: var(--surface);
      color: inherit;
      font-size: 15px;
      font-family: var(--font);
    }
    input[type="color"] { min-height: 48px; padding: 4px 8px; cursor: pointer; }
    textarea { min-height: 80px; resize: vertical; }

    .toggle-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 0 14px;
      border: 2px solid var(--border2);
      border-radius: 999px;
      background: var(--surface);
      font-size: 15px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .pill input { transform: scale(1.2); }

    .modal-foot {
      position: sticky;
      bottom: 0;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      padding: 14px 18px;
      background: Canvas;
      border-top: 2px solid var(--border);
    }
    .spacer { flex: 1; }

    /* ═══════════════════════════════════════
       ROW HEIGHT — written by calcHeight() in JS
       Placed after main styles so it wins without
       needing extra specificity.
    ═══════════════════════════════════════ */
  </style>
  <style id="rowStyle"></style>
</head>
<body>

  <header>
    <h1>TECHNIK-Kalender</h1>
    <button class="btn primary" id="addBtn">+ Aufgabe</button>
    <button class="btn danger"  id="delBtn">L&#246;schen</button>
    <div class="sep"></div>
    <button class="btn" id="focusTodayBtn">Heute</button>
    <button class="btn" id="focusAllBtn">Alles</button>
    <input id="focusDate" type="date" />
    <button class="btn" id="focusPickBtn">Anzeigen</button>
    <div class="sep"></div>
    <button class="btn" id="resetBtn">Zur&#252;cksetzen</button>
  </header>

  <div id="wrap">
    <div id="timeline"></div>
  </div>

  <dialog id="editDialog">
    <form method="dialog" id="editForm">
      <div class="modal-head"><b id="modalTitle">Aufgabe</b></div>
      <div class="modal-body">
        <label>Name / Aufgabe
          <input id="f_content" required />
        </label>
        <div class="grid2">
          <label>Start
            <input id="f_start" type="datetime-local" required />
          </label>
          <label>Ende
            <input id="f_end" type="datetime-local" />
          </label>
        </div>
        <div class="grid2">
          <label>Gewerk
            <select id="f_group"></select>
          </label>
          <label>Status
            <select id="f_status">
              <option value="status-todo">ToDo</option>
              <option value="status-doing">In Arbeit</option>
              <option value="status-wait">Wartet</option>
              <option value="status-critical">Kritisch</option>
              <option value="status-done">Erledigt</option>
            </select>
          </label>
        </div>
        <div class="grid2">
          <label>Zusatzfarbe (optional)
            <input id="f_color" type="color" value="#4b9bff" />
          </label>
          <label>Farbe anwenden?
            <select id="f_colorMode">
              <option value="none">Keine</option>
              <option value="bg">Hintergrund</option>
              <option value="border">Rahmen</option>
              <option value="both">Beides</option>
            </select>
          </label>
        </div>
        <div class="toggle-row">
          <label class="pill"><input type="checkbox" id="f_bold"> Fett</label>
          <label class="pill"><input type="checkbox" id="f_italic"> Kursiv</label>
          <label class="pill"><input type="checkbox" id="f_underline"> Unterstrichen</label>
        </div>
        <label>Notiz (Tooltip, optional)
          <textarea id="f_note" placeholder="Ansprechpartner, Abh&#228;ngigkeiten&#8230;"></textarea>
        </label>
      </div>
      <div class="modal-foot">
        <button class="btn" value="cancel">Abbrechen</button>
        <span class="spacer"></span>
        <button class="btn primary" value="default">Speichern</button>
      </div>
    </form>
  </dialog>

  <script>
    'use strict';

    // ── Konstanten ─────────────────────────────────────────
    const STORAGE_KEY = 'technik_kalender_v2';

    const GROUPS = [
      { id: 'buehne', label: 'B\u00fchne', wk: 'wk-buehne' },
      { id: 'licht',  label: 'Licht',      wk: 'wk-licht'  },
      { id: 'ton',    label: 'Ton',         wk: 'wk-ton'    },
      { id: 'video',  label: 'Video',       wk: 'wk-video'  },
    ];
    const WK_MAP     = Object.fromEntries(GROUPS.map(g => [g.id, g.wk]));
    const STATUS_CLS = ['status-todo','status-doing','status-wait','status-critical','status-done'];
    const FORMAT_CLS = ['fmt-bold','fmt-italic','fmt-underline'];
    const WK_CLS     = GROUPS.map(g => g.wk);

    // ── Helpers ────────────────────────────────────────────
    const pad = n => String(n).padStart(2, '0');
    const uid = () => Math.random().toString(16).slice(2) + Date.now().toString(16);

    function toLocalStr(d) {
      const dt = d instanceof Date ? d : new Date(d);
      return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())} ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
    }
    function toInputStr(d) {
      const dt = d instanceof Date ? d : new Date(d);
      return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}T${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
    }
    function parseStr(s) {
      const m = String(s).trim().match(/^(\d{4})-(\d{2})-(\d{2})[T\s](\d{2}):(\d{2})/);
      if (!m) return null;
      return new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5], 0, 0);
    }
    function todayStr() {
      const t = new Date();
      return `${t.getFullYear()}-${pad(t.getMonth()+1)}-${pad(t.getDate())}`;
    }

    // ── Klassen-System ─────────────────────────────────────
    function splitCls(s)  { return String(s||'').split(/\s+/).map(x=>x.trim()).filter(Boolean); }
    function joinCls(arr) { return [...new Set(arr)].join(' ').trim(); }

    function buildCls({ groupId, status, bold, italic, underline, existing }) {
      let c = splitCls(existing).filter(x => !STATUS_CLS.includes(x) && !FORMAT_CLS.includes(x) && !WK_CLS.includes(x));
      if (WK_MAP[groupId])  c.push(WK_MAP[groupId]);
      if (status)           c.push(status);
      if (bold)             c.push('fmt-bold');
      if (italic)           c.push('fmt-italic');
      if (underline)        c.push('fmt-underline');
      return joinCls(c);
    }

    function applyColor(style, hex, mode) {
      const s = String(style||'')
        .replace(/background:\s*#[\da-fA-F]{3,8}\s*;?/g, '')
        .replace(/border-color:\s*#[\da-fA-F]{3,8}\s*;?/g, '')
        .trim();
      if (!hex || mode === 'none') return s;
      const parts = s ? [s.endsWith(';') ? s : s+';'] : [];
      if (mode==='bg'||mode==='both')     parts.push(`background:${hex};`);
      if (mode==='border'||mode==='both') parts.push(`border-color:${hex};`);
      return parts.join(' ');
    }

    // ── Gruppen — immer aus dem Code, nie aus localStorage ─
    const groups = new vis.DataSet(
      GROUPS.map(g => ({ id: g.id, content: g.label, className: g.wk }))
    );

    // ── Demo-Daten (relativ zu heute) ──────────────────────
    function defaultItems() {
      const p = todayStr();
      return [
        { id:'t1', group:'buehne', content:'B\u00fchnenaufbau',        start:`${p} 08:00`, end:`${p} 12:00`, className:'status-todo',             type:'range' },
        { id:'t2', group:'ton',    content:'PA aufbauen & Kabel',  start:`${p} 09:00`, end:`${p} 12:00`, className:'status-todo',             type:'range' },
        { id:'t3', group:'licht',  content:'Rig aufbauen',         start:`${p} 09:00`, end:`${p} 12:00`, className:'status-todo',             type:'range' },
        { id:'t4', group:'ton',    content:'Soundcheck',           start:`${p} 12:00`, end:`${p} 13:00`, className:'status-critical fmt-bold', type:'range' },
        { id:'t5', group:'licht',  content:'Lichtfokus & Presets', start:`${p} 12:00`, end:`${p} 13:00`, className:'status-wait',             type:'range' },
        { id:'t6', group:'video',  content:'Beamer / Stream',      start:`${p} 10:00`, end:`${p} 13:00`, className:'status-todo',             type:'range' },
        { id:'t7', group:'buehne', content:'Veranstaltung',        start:`${p} 14:00`, end:`${p} 18:00`, className:'status-doing fmt-bold',   type:'range' },
      ];
    }

    // ── Storage ────────────────────────────────────────────
    function loadItems() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const m = JSON.parse(raw);
        return Array.isArray(m.items) ? m.items : null;
      } catch { return null; }
    }
    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        version: 2,
        savedAt: new Date().toISOString(),
        items: items.get().map(x => ({
          ...x,
          start: x.start instanceof Date ? toLocalStr(x.start) : x.start,
          end:   x.end   instanceof Date ? toLocalStr(x.end)   : (x.end||undefined),
        }))
      }, null, 2));
    }

    const rawItems = (loadItems() || defaultItems()).map(x => {
      const start = parseStr(x.start) || x.start;
      const end   = x.end ? (parseStr(x.end) || x.end) : undefined;
      const cls   = splitCls(x.className);
      return {
        ...x,
        start,
        end,
        type: 'range',
        className: buildCls({
          groupId:   x.group,
          status:    cls.find(c => STATUS_CLS.includes(c)) || 'status-todo',
          bold:      cls.includes('fmt-bold'),
          italic:    cls.includes('fmt-italic'),
          underline: cls.includes('fmt-underline'),
          existing:  x.className,
        }),
      };
    });
    const items = new vis.DataSet(rawItems);

    // ── H\u00f6henberechnung ────────────────────────────────────────
    // Wir messen #wrap.offsetHeight (nach dem Flex-Layout) statt
    // window.innerHeight minus Header — zuverl\u00e4ssiger auf iOS.
    const rowStyleEl = document.getElementById('rowStyle');

    function calcHeight() {
      const wrap      = document.getElementById('wrap');
      const available = wrap.offsetHeight - 20; // 10px padding oben + unten
      const axisH     = 52;
      const rowH      = Math.max(Math.floor((available - axisH) / GROUPS.length), 60);
      rowStyleEl.textContent = [
        `.vis-timeline .vis-group { min-height: ${rowH}px !important; }`,
        `.vis-timeline .vis-label { min-height: ${rowH}px !important; }`,
      ].join('\n');
      return available;
    }

    // ── Modal-Referenzen ───────────────────────────────────
    const dlg   = document.getElementById('editDialog');
    const fName = document.getElementById('f_content');
    const fStart= document.getElementById('f_start');
    const fEnd  = document.getElementById('f_end');
    const fGrp  = document.getElementById('f_group');
    const fStat = document.getElementById('f_status');
    const fNote = document.getElementById('f_note');
    const fBold = document.getElementById('f_bold');
    const fItal = document.getElementById('f_italic');
    const fUnde = document.getElementById('f_underline');
    const fCol  = document.getElementById('f_color');
    const fColM = document.getElementById('f_colorMode');

    fStart.addEventListener('change', () => {
      if (fEnd.value) return;
      const s = parseStr(fStart.value);
      if (s) fEnd.value = toInputStr(new Date(s.getTime() + 2*60*60*1000));
    });

    function openEditor({ mode, item }, done) {
      document.getElementById('modalTitle').textContent =
        mode === 'add' ? 'Aufgabe hinzuf\u00fcgen' : 'Aufgabe bearbeiten';

      fGrp.innerHTML = '';
      GROUPS.forEach(g => {
        const o = document.createElement('option');
        o.value = g.id; o.textContent = g.label;
        if (g.id === item.group) o.selected = true;
        fGrp.appendChild(o);
      });

      fName.value  = item.content ?? '';
      fStart.value = toInputStr(item.start ?? new Date());
      fEnd.value   = item.end ? toInputStr(item.end) : '';
      fNote.value  = item.title ?? '';
      fColM.value  = 'none';
      fCol.value   = '#4b9bff';

      const cls = splitCls(item.className);
      fStat.value    = cls.find(c => STATUS_CLS.includes(c)) || 'status-todo';
      fBold.checked  = cls.includes('fmt-bold');
      fItal.checked  = cls.includes('fmt-italic');
      fUnde.checked  = cls.includes('fmt-underline');

      const onClose = () => {
        dlg.removeEventListener('close', onClose);
        if (dlg.returnValue !== 'default') return done(null);

        const start = parseStr(fStart.value);
        const end   = fEnd.value.trim() ? parseStr(fEnd.value) : null;
        if (!start) { alert('Bitte ein g\u00fcltiges Startdatum w\u00e4hlen.'); return done(null); }
        if (end && end < start) { alert('Ende darf nicht vor Start liegen.'); return done(null); }

        const gid = fGrp.value;
        done({
          ...item,
          content:   fName.value.trim() || 'Ohne Titel',
          start,
          end:       end || undefined,
          group:     gid,
          className: buildCls({ groupId:gid, status:fStat.value, bold:fBold.checked, italic:fItal.checked, underline:fUnde.checked, existing:item.className }),
          style:     applyColor(item.style, fCol.value, fColM.value) || undefined,
          title:     fNote.value.trim() || undefined,
          type:      'range',
        });
      };

      dlg.addEventListener('close', onClose);
      dlg.showModal();
      fName.focus(); fName.select();
    }

    // ── Timeline — in requestAnimationFrame erstellen ──────
    // RAF stellt sicher, dass der Browser das Flex-Layout abgeschlossen
    // hat, bevor wir #wrap.offsetHeight messen.
    let timeline;

    requestAnimationFrame(() => {
      timeline = new vis.Timeline(
        document.getElementById('timeline'),
        items,
        groups,
        {
          height:          calcHeight(),
          stack:           false,
          groupHeightMode: 'auto',
          zoomMin:         1000 * 60 * 30,
          zoomMax:         1000 * 60 * 60 * 24 * 30,
          selectable:      true,
          multiselect:     false,
          showCurrentTime: true,
          margin:          { item: 8, axis: 5 },
          editable:        { add: true, updateTime: true, updateGroup: true, remove: true },
          onAdd(item, cb) {
            openEditor({ mode:'add', item:{ ...item, id:uid(), type:'range' } }, r => {
              cb(r ?? null);
              if (r) saveData();
            });
          },
          onUpdate(item, cb) {
            openEditor({ mode:'edit', item:{ ...item } }, r => {
              cb(r ?? null);
              if (r) saveData();
            });
          },
          onRemove(item, cb) {
            if (!confirm(`Aufgabe l\u00f6schen?\n\n${item.content}`)) return cb(null);
            cb(item);
            saveData();
          },
        }
      );

      // Heute anzeigen
      const t = new Date();
      timeline.setWindow(
        new Date(t.getFullYear(), t.getMonth(), t.getDate(),  6, 0),
        new Date(t.getFullYear(), t.getMonth(), t.getDate(), 22, 0),
        { animation: false }
      );

      // Toolbar-Events (brauchen timeline-Referenz)
      document.getElementById('addBtn').onclick = () => {
        const now   = new Date();
        const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours()+1, 0);
        const end   = new Date(start.getTime() + 2*60*60*1000);
        const gid   = GROUPS[0].id;
        openEditor({
          mode: 'add',
          item: { id:uid(), group:gid, content:'', start, end, type:'range',
            className: buildCls({ groupId:gid, status:'status-todo', existing:'' }) }
        }, r => { if (!r) return; items.add(r); saveData(); });
      };

      document.getElementById('delBtn').onclick = () => {
        const sel = timeline.getSelection();
        if (!sel.length) return alert('Bitte zuerst eine Aufgabe antippen.');
        const it = items.get(sel[0]);
        if (!confirm(`Aufgabe l\u00f6schen?\n\n${it.content}`)) return;
        items.remove(sel[0]);
        saveData();
      };

      document.getElementById('focusTodayBtn').onclick = () => {
        const t = new Date();
        timeline.setWindow(
          new Date(t.getFullYear(), t.getMonth(), t.getDate(),  6, 0),
          new Date(t.getFullYear(), t.getMonth(), t.getDate(), 22, 0),
          { animation: true }
        );
      };

      document.getElementById('focusAllBtn').onclick = () => timeline.fit({ animation: true });

      document.getElementById('focusPickBtn').onclick = () => {
        const v = document.getElementById('focusDate').value;
        if (!v) return alert('Bitte erst ein Datum w\u00e4hlen.');
        const m = v.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (!m) return;
        const d = new Date(+m[1], +m[2]-1, +m[3]);
        timeline.setWindow(
          new Date(d.getFullYear(), d.getMonth(), d.getDate(),  6, 0),
          new Date(d.getFullYear(), d.getMonth(), d.getDate(), 22, 0),
          { animation: true }
        );
      };

      // Fenster-Resize
      window.addEventListener('resize', () => {
        timeline.setOptions({ height: calcHeight() });
      });

      // Autosave
      items.on('*', saveData);
    });

    // Datum-Input vorbelegen
    document.getElementById('focusDate').value = todayStr();

    document.getElementById('resetBtn').onclick = () => {
      if (!confirm('Demo-Plan laden? Gespeicherte Daten werden \u00fcberschrieben.')) return;
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    };
  </script>
</body>
</html>
